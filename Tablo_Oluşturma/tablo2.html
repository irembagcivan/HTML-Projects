<!DOCTYPE html>
<html>
    <head>

    </head>
    <body>
        <table border="1">
            <caption>Ülke Nüfusları</caption>
            
            <!-- TABLO BAŞI -->
            <thead>
                <tr><th>Ülke</th><th>Nüfus</th></tr> <!-- th: table head - tablo başlığı -->
            </thead>

            <!--TABLO ORTASI -->
            <tbody>
                <tr><td>Türkiye</td><td>82M</td></tr>
                <tr><td>Yunanistan</td><td>12M</td></tr>
                <tr><td>Bulgaristan</td><td>10M</td></tr>
            </tbody>

            <!-- TABLO SONU -->
            <tfoot>
                <tr><td colspan="2">Toplam Nüfus:104M</td></tr>
            </tfoot>

        </table>
    </body>
</html>
<!-- td: table data, tr: table row, colspan: iki hücreyi birleştir (yan yana), rowspan: iki hücreyi birleştirir (alt alta) -->
