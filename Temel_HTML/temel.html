<!--     F5 ile sayfamızın önizlemesini görebiliriz. Yada direkt klasörde dosyamıza tıklarız.       -->
<!--     <br> tag'i ile alt satıra geçmemiz sağlanır.     -->
<!DOCTYPE html>
<html lang ="tr">
    <head> <!-- SUNUCU VE ARAMA MOTORLARI İLE İLGİLİ BİLGİLERİ İÇERİR -->
        <title>TEMEL HTML KOMUTLARI</title> <!-- SAYFA İLE İLGİLİ AÇIKLAMALARI BARINDIRIR. SAYFA AÇILDIĞINDA TARAYICI SEKMESİNDE GÖRÜLÜR. ÜST KISIMDA SEKMENİN ADIDIR. -->
        <meta charset= "utf-8">
    </head>
    <body> <!-- ZİYARETÇİYE GÖSTERİLECEK İÇERİĞİ BARINDIRIR -->
        <h1 title="anabaslik" id="anabaslik">Temel HTML Komutları</h1>
        <h2 class="kalin">Head Bölümü Komutları</h2>
        <p>Birinci paragraf </p>
        <p>İkinci paragraf :) </p>
        <h2 class="kalin">Body Bölümü komutları</h2>
        <p style="color: deeppink;">Hx Başlık Metinleri</p>
        <p style="color:blueviolet;">p paragraf etiketi</p>
        <p style="color:red"> Paragrafları bölmek istersek br tag'ini kullanırız. Bu sayede alt satıra geçebiliriz. Örneğin şimdi <br> alt satıra geçtik. F5 İLE KONTROL ET!</p>
    </body>
</html>
